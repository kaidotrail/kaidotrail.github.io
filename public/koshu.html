        宿場: stationOverlay,
        見どころ: spotOverlay,
        おすすめ歩行ルート: routeOverlay,

        上諏訪宿内別ルート: kamisuwaAltRouteOverlay,
        "kagaorange の足跡": gpxOverlay,

      activateJinsokuMap(L, layerControl);

          pictures: [
            {
              url: "https://kaidotrail.github.io/img/kagaorange/2025/02-22/PXL_20250221_202200916.MP.webp",

            "ことに由来するそうです。明治39年 (1906) まではここに枡形石垣があったそうです。",
