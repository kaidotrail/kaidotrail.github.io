      L.polyline(nohejiShortRoute, { color: "lightcoral", weight: 5 }).addTo(

      // GPX
      setGpx(L, gpxOverlay, "gpx/kagaorange_2025-08-23.gpx", "blue"); // #1 白河→須賀川
