    <h1>
      <a href="./"><span class="logo-font">旧街道足跡マップ</span></a>
      <span class="sep">&gt;</span>
      <span id="route-entry">日光街道</span>

    </h1>
    <div id="zoom-in-message">
      <span>ズームインすると見どころが表示されます<br />(江戸方から追加中)</span>
    </div>
    <div id="map"></div>
    <div id="spot-list" class="non-map-screen"></div>
    <div id="own-gpx" class="non-map-screen"></div>
    <script>
      const map = createMap(L);
      const routeOverlay = L.layerGroup();
      routeOverlay.addTo(map);
      const stationOverlay = L.layerGroup();
      stationOverlay.addTo(map);
      const spotOverlay = L.layerGroup();
      spotOverlay.addTo(map);
      const gpxOverlay = L.layerGroup();
      gpxOverlay.addTo(map);
      const layerControl = initMap(L, map, {
        宿場: stationOverlay,
        見どころ: spotOverlay,
        おすすめ歩行ルート: routeOverlay,
        "kagaorange の軌跡": gpxOverlay,
      });
      activateJinsokuMap(L, layerControl);
      activateKonjakuMap(L, layerControl, "kanto", "00");
      activateKonjakuMap(L, layerControl, "kanto", "01");

      // Stations
      const stations = [
        { name: "日本橋", coordinate: [35.684112, 139.774533] },
        { name: "1. 千住宿", coordinate: [35.750531, 139.80279] },
        { name: "2. 草加宿", coordinate: [35.831347, 139.80631] },
        { name: "3. 越谷宿", coordinate: [35.895828, 139.783499] },
        { name: "4. 粕壁宿", coordinate: [35.981883, 139.756281] },
        { name: "5. 杉戸宿", coordinate: [36.029386, 139.727755] },
        { name: "6. 幸手宿", coordinate: [36.07637, 139.71916] },
        { name: "7. 栗橋宿", coordinate: [36.1417001, 139.7024113] },
        { name: "8. 中田宿", coordinate: [36.148689, 139.709459] },
        { name: "9. 古河宿", coordinate: [36.194882, 139.705503] },
        { name: "10. 野木宿", coordinate: [36.216484, 139.7125286] },
        { name: "11. 間々田宿", coordinate: [36.268114, 139.766943] },
        { name: "12. 小山宿", coordinate: [36.3123, 139.803048] },
        { name: "13. 新田宿", coordinate: [36.3591287, 139.8310179] },
        { name: "14. 小金井宿", coordinate: [36.3830322, 139.8444021] },
        { name: "15. 石橋宿", coordinate: [36.436379, 139.863665] },
        { name: "16. 雀宮宿", coordinate: [36.49374, 139.872359] },
        { name: "17. 宇都宮宿", coordinate: [36.5618848, 139.8771143] },
        { name: "18. 徳次郎宿", coordinate: [36.6480208, 139.8459363] },
        { name: "19. 大沢宿", coordinate: [36.696089, 139.756182] },
        { name: "20. 今市宿", coordinate: [36.725936, 139.68379] },
        { name: "21. 鉢石宿", coordinate: [36.750167, 139.611103] },
        { name: "日光東照宮", coordinate: [36.757875, 139.598757] },
      ];
      const stationLayer = L.featureGroup();
      setMarkers(L, stationOverlay, stationLayer, stations);
      initQueryParamUpdater(map, () => map.fitBounds(stationLayer.getBounds()));

      // Spots
      const spots = [
        // 日本橋
        nihonbashiSpot,
        {
          name: "薬種問屋の集積地・本町",
          kana: "やくしゅどんやのしゅうせきち・ほんちょう",
          coordinate: [35.687734, 139.774192],
          icon: "monument",
          description:
            "武田薬品工業の本社ビル前に「薬種問屋の集積地・本町」と書かれた説明板、そして" +
            "「本庁薬問屋発祥の町」と彫られた石碑があります。" +
            "江戸時代初期から薬草や薬を扱う薬種問屋が軒を連ねており、薬の匂いが立ち込めるほどだったそうです。" +
            "現代でも武田・第一三京・アステラスといった製薬会社の本社ビルが立ち並んでいます。" +
            "昭和4年には薬祖神社も建てられました。",
          pictures: [
            {
              url: "https://kaidotrail.github.io/img/kagaorange/2024/09-21/PXL_20240920_200605639.webp",

            },
          ],
        },
        {
          name: "地下横断歩道",
          coordinate: [35.6883267, 139.776183],

          pictures: [
            {
              url: "https://kaidotrail.github.io/img/kagaorange/2024/09-21/PXL_20240920_200833609.webp",

            },
          ],
        },
        {
          name: "旧日光街道本通り",
          coordinate: [35.689, 139.77773],
          icon: "monument",
          description:
            "昭和58年 (1983) に建てられた旧日光街道本通りと彫られた石碑があります。" +
            "石碑の建つ場所からは東京スカイツリーを見通すことができます。",
          pictures: [
            {
              url: "https://kaidotrail.github.io/img/kagaorange/2024/09-21/PXL_20240920_201547896.webp",
              comment: "旧日光街道本通り",
            },
            {
              url: "https://kaidotrail.github.io/img/kagaorange/2024/09-21/PXL_20240920_201838309.webp",

        },
        {

            },
            {

            "幕府の米蔵 (浅草御蔵) があったことが蔵前の地名の由来であることや、天明2年 (1782) に天文台がつくられ" +
            "伊能忠敬が関わったことなども記されています。説明板の左側には文久元年 (1861) の東都浅草絵図があります。",
          url: "https://kikuboshi.co.jp/mtc/",
          pictures: [

              url: "https://kaidotrail.github.io/img/kagaorange/2024/09-21/PXL_20240920_204246818.webp",
              comment: "説明板",
            },
          ],
        },
        {
          name: "天文台跡",
          coordinate: [35.701457, 139.788733],
          icon: "monument",
          description:
            "天明2年 (1782) に建てられた天文台の説明板と、浅草蔵前の地名の由来を示した説明板があります。" +
            "天文台は暦を作る役所「天文方」の施設「頒暦所御用屋敷」で、至時の弟子には伊能忠敬がおり、全国の測量を" +

            "また、ここにはのちに外国語の翻訳所が設置され、それが現在の東京大学のルーツだそうです。" +
            '蔵前のほうは、幕府の米蔵 "御蔵" があったことが由来とのことです。',
          pictures: [
            {

            "説明板には天和2年 (1682) 江戸絵図が掲載されており、諏訪大明神と記されていることがわかります。",
          pictures: [
            {
              url: "https://kaidotrail.github.io/img/kagaorange/2024/09-21/PXL_20240920_205718602.webp",
              comment: "諏訪神社",
            },
            {
              url: "https://kaidotrail.github.io/img/kagaorange/2024/09-21/PXL_20240920_205709251.webp",

        },

          url: "https://www.senso-ji.jp/guide/guide01.html",
          pictures: [

              url: "https://kaidotrail.github.io/img/kagaorange/2024/09-21/PXL_20240920_212655620.webp",

            },

        },
        {

          kana: "なかみせしょうてんがい",

          icon: "camera",

          pictures: [

            },

        },
        {
          name: "浅草寺",
          kana: "せんそうじ",
          coordinate: [35.71448, 139.796713],
          icon: "temple",
          description:
            "飛鳥時代に成立した都内最古のお寺とされ、聖観世音菩薩 (しょうかんぜおんぼさつ) を本尊としています。" +
            "お参りの際は合唱して「無無観世音菩薩 (なむかんぜおんぼさつ)」とお唱えするのが作法とされています。" +
