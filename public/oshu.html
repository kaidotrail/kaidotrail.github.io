    <h1>
      <a href="./"><span class="logo-font">旧街道足跡マップ</span></a>

    <script>
      const map = createMap(L);
      const routeOverlay = L.layerGroup();
      routeOverlay.addTo(map);
      const stationOverlay = L.layerGroup();
      stationOverlay.addTo(map);
      const spotOverlay = L.layerGroup();
      spotOverlay.addTo(map);
      const gpxOverlay = L.layerGroup();
      gpxOverlay.addTo(map);
      const layerControl = initMap(L, map, {
        宿場: stationOverlay,
        見どころ: spotOverlay,
        おすすめ歩行ルート: routeOverlay,
        "kagaorange の足跡": gpxOverlay,
      });
      activateKonjakuMap(L, layerControl, "kanto", "00");
      activateKonjakuMap(L, layerControl, "kanto", "01");

      // Stations
      const stations = [
        { name: "17. 宇都宮宿", coordinate: [36.561748, 139.87719] },
        { name: "18. 白沢宿", coordinate: [36.632525, 139.9437457] },
        { name: "19. 氏家宿", coordinate: [36.679533, 139.967439] },
        { name: "20. 喜連川宿", coordinate: [36.719222, 140.025786] },
        { name: "21. 佐久山宿", coordinate: [36.808802, 140.00756] },
        { name: "22. 大田原宿", coordinate: [36.865234, 140.024641] },
        { name: "23. 鍋掛宿", coordinate: [36.9437096, 140.1038682] },
        { name: "24. 越堀宿", coordinate: [36.946183, 140.10469] },
        { name: "25. 芦野宿", coordinate: [36.989512, 140.163206] },
        { name: "26. 白坂宿", coordinate: [37.078146, 140.1911581] },
        { name: "27. 白河宿", coordinate: [37.126858, 140.215489] },
      ];
      const stationLayer = L.featureGroup();
      setMarkers(L, stationOverlay, stationLayer, stations);
      initQueryParamUpdater(map, () => map.fitBounds(stationLayer.getBounds()));

      // Spots
      const spots = [
        ...utsunomiyaSpots,
        {
          name: "宇都宮二荒山神社",
          kana: "うつのみやふたあらやまじんじゃ",
          coordinate: [36.562383, 139.885806],
          icon: "shrine",
          description:
            "崇神天皇の時代に成立したと伝わる大変古い神社で、崇神天皇の第一皇子である豊城入彦命を御祭神としています。" +
            "下野国一之宮にもなっており、宇都宮という地名は一之宮がなまったものという説があるそうです。" +
            "日光の二荒山神社は「ふたらさん」と読みますが、こちらは「ふたあらやま」と読みます。",
          url: "http://futaarayamajinja.jp",
          pictures: [
            {
              url: "https://kaidotrail.github.io/img/kagaorange/2025/01-24/PXL_20250123_222512610.webp",
              comment: "宇都宮二荒山神社",
            },
            {
              url: "https://kaidotrail.github.io/img/kagaorange/2025/01-24/PXL_20250123_222307753.webp",
              comment: "鳥居",
            },
            {
              url: "https://kaidotrail.github.io/img/kagaorange/2025/01-24/PXL_20250123_222653658.webp",
              comment: "祭神 豊城入彦命と二荒山神社 説明板",
            },
          ],
        },
        {
          name: "鉄砲町通り",
          coordinate: [36.561324, 139.884218],
          icon: "guide",
          description:
            "旧町名杉原町の説明板があり、江戸時代宇都宮城下図にて奥州街道の道順が示されています。<br/>" +
            "<span class='routing'>白河方</span> 右折して脇道に入ります。<br/>" +
            "<span class='routing'>江戸方</span> 左折して大通りに入ります。",
          pictures: [
            {
              url: "https://kaidotrail.github.io/img/kagaorange/2025/01-24/PXL_20250123_222054611.webp",
              comment: "旧町名 杉原町",
            },
            {
              url: "https://kaidotrail.github.io/img/kagaorange/2025/01-24/PXL_20250123_223426590.webp",
              comment: "鉄砲町通り北側入口",
            },
          ],
        },
        {
          name: "オリオン通り",
          coordinate: [36.560194, 139.883987],
          icon: "guide",
          description:
            "街道の道筋はここで直角に曲がります。<br/>" +
            "<span class='routing'>白河方</span> アーケードに入り左折します。<br/>" +
            "<span class='routing'>江戸方</span> 右折しアーケードを出て鉄砲町通りに入ります。",
          pictures: [
            {

            },
            {
              url: "https://kaidotrail.github.io/img/kagaorange/2025/01-24/PXL_20250123_223953100.webp",
              comment: "旧町名 日野町",
            },
          ],
        },
        {
          name: "大町通り",
          coordinate: [36.560133, 139.888415],
          icon: "guide",
          description:
            "大町通りの西端で道筋が折れ曲がっています。<br/>" +
            "<span class='routing'>白河方</span> オリオン通りの延長線上にあるひのまち通りを経由し" +

            "祈願成就のお礼の生贄として二荒山神社に献納された樋爪俊衡と弟季衡の墓と伝えられているそうです。",
          pictures: [
            {
              url: "https://kaidotrail.github.io/img/kagaorange/2025/01-24/PXL_20250123_225149665.webp",
              comment: "三峰山神社",
            },
            {
              url: "https://kaidotrail.github.io/img/kagaorange/2025/01-24/PXL_20250123_225138214.webp",

        },

          pictures: [

        {

          kana: "かんおんほんとくひ",

          description:

            "安政年間 (1855-60) に海道新田に水路を開き水田開拓に務めた小林氏の顕彰碑のようです。" +

            {

        },
        {
          name: "稚ケ坂",
          kana: "ちがさか",
          coordinate: [36.618631, 139.930683],

            "坂の上には段ボール原紙や紙管原紙などを作る製紙工場があり、巨大なボイラがそびえ立っています。",

          pictures: [

            },
            {
              url: "https://kaidotrail.github.io/img/kagaorange/2025/01-24/PXL_20250124_005604750.webp",

            },
          ],
        },
        {
          name: "勝善神",
          kana: "そうぜんしん",
          coordinate: [36.630188, 139.94008],
          icon: "monument",
          description:
            "栃木県内では勝善神と書かれた石碑が多数あり、街道筋では喜連川や日光街道の宇都宮市松原などでも" +

          name: "白沢地蔵堂",
          kana: "しらさわじぞうどう",
          coordinate: [36.630349, 139.940591],
          icon: "temple",
          description:
            "白沢地蔵堂の伝説と書かれた説明板があり、伊沢家景が頼朝の命を受け奥羽総奉行として東北に向かう途中、" +
            "病気になった子が稚児ヶ坂で亡くなりこの地に葬った際に建てられたと伝わるそうです。",
          pictures: [
            {
              url: "https://kaidotrail.github.io/img/kagaorange/2025/01-24/PXL_20250124_011450529.webp",
              comment: "白沢地蔵堂",
            },
            {
              url: "https://kaidotrail.github.io/img/kagaorange/2025/01-24/PXL_20250124_011522752.webp",

          ],
        },
        {
          name: "やげん坂",

          pictures: [
            {
              url: "https://kaidotrail.github.io/img/kagaorange/2025/01-24/PXL_20250124_011757693.webp",

            },
            {
